name: Keep Render Services Awake

on:
  schedule:
    # Run every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/14 * * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Mock Score API
        run: |
          if [ -z "${{ vars.MOCK_API_URL }}" ]; then
            echo "MOCK_API_URL repository variable is not set. Skipping."
          else
            echo "Pinging Mock API: ${{ vars.MOCK_API_URL }}/health"
            curl -sSf "${{ vars.MOCK_API_URL }}/health" || echo "Ping failed or returned non-200, but continuing."
          fi

      - name: Ping Go Backend Proxy
        run: |
          if [ -z "${{ vars.BACKEND_API_URL }}" ]; then
            echo "BACKEND_API_URL repository variable is not set. Skipping."
          else
            echo "Pinging Backend API: ${{ vars.BACKEND_API_URL }}/health"
            curl -sSf "${{ vars.BACKEND_API_URL }}/health" || echo "Ping failed or returned non-200, but continuing."
          fi
