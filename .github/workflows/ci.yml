name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mock-api: ${{ steps.filter.outputs.mock-api }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mock-api:
              - 'mock-score-api/**'
            backend:
              - 'streaming-app-backend/**'
            frontend:
              - 'streaming-app-frontend/**'

  test-mock-api:
    needs: changes
    if: ${{ needs.changes.outputs.mock-api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mock-score-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ./mock-score-api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest test_app.py

  test-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./streaming-app-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: go test -v ./...

  test-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./streaming-app-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./streaming-app-frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
